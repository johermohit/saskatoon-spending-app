<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Saskatoon Spending Heatmap</title>
    <script src='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js'></script>
    <link href='https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css' rel='stylesheet' />
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id='map'></div>
<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://demotiles.maplibre.org/style.json',
        center: [-106.6702, 52.1332],
        zoom: 11,
        pitch: 45,
        bearing: -17.6,
        antialias: true
    });

    map.on('load', async () => {
        try {
            const response = await fetch('../data/summary.json');
            const data = await response.json();

            const geojson = {
                'type': 'FeatureCollection',
                'features': data.map(item => ({
                    'type': 'Feature',
                    'properties': {
                        'name': item.Neighborhood,
                        'spend': item.Total_Spend,
                        'height': item.Total_Spend / 100
                    },
                    'geometry': {
                        'type': 'Point',
                        'coordinates': item.Coordinates
                    }
                }))
            };

            map.addSource('spending', {
                'type': 'geojson',
                'data': geojson
            });

            map.addLayer({
                'id': 'spending-extrusion',
                'type': 'fill-extrusion',
                'source': 'spending',
                'paint': {
                    'fill-extrusion-color': '#0080ff',
                    'fill-extrusion-height': ['get', 'height'],
                    'fill-extrusion-base': 0,
                    'fill-extrusion-opacity': 0.8
                }
            });

            map.on('click', 'spending-extrusion', (e) => {
                const props = e.features[0].properties;
                new maplibregl.Popup()
                    .setLngLat(e.lngLat)
                    .setHTML(`<strong>${props.name}</strong><br>Total Spend: $${props.spend.toLocaleString()}`)
                    .addTo(map);
            });
        } catch (err) {
            console.error('Error loading summary data:', err);
        }
    });
</script>
</body>
</html>
